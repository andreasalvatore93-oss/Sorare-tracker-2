name: Multi-League Sentiment Analysis Scanner

on:
  workflow_dispatch:
    inputs:
      total_minutes:
        description: "Minuti totali di ascolto (default 120)"
        required: false
        default: "120"
      chunk_minutes:
        description: "Durata di ogni singola sessione prima di salvare+committare (default 10 min -- se ti interrompi perdi al massimo questo intervallo)"
        required: false
        default: "10"

permissions:
  contents: write

concurrency:
  group: multi-league-sentiment-scanner
  cancel-in-progress: false

jobs:
  sentiment-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests websocket-client curl_cffi

      - name: Run Sentiment Scanner in chunks (con commit protettivo tra una sessione e l'altra)
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          PYTHONUNBUFFERED: "1"
        run: |
          TOTAL_SECONDS=$(( ${{ github.event.inputs.total_minutes || '30' }} * 60 ))
          CHUNK_SECONDS=$(( ${{ github.event.inputs.chunk_minutes || '2' }} * 60 ))
          ELAPSED=0
          CHUNK_NUM=1

          git config user.name "sentiment-scanner"
          git config user.email "sentiment-scanner@users.noreply.github.com"

          # Cartelle di output derivate dinamicamente dalla whitelist (seconda colonna
          # di ogni riga non-commento) -- aggiungere un campionato alla whitelist non
          # richiede toccare questo workflow
          OUTPUT_DIRS=$(grep -v '^#' scanner_campionati_whitelist.txt | grep -v '^\s*$' | cut -d':' -f2 | tr '\n' ' ')
          echo "Cartelle di output tracciate: $OUTPUT_DIRS"

          while [ $ELAPSED -lt $TOTAL_SECONDS ]; do
            REMAINING=$(( TOTAL_SECONDS - ELAPSED ))
            THIS_CHUNK=$CHUNK_SECONDS
            if [ $REMAINING -lt $CHUNK_SECONDS ]; then
              THIS_CHUNK=$REMAINING
            fi

            echo "=================================================================="
            echo "SESSIONE $CHUNK_NUM — ascolto per $THIS_CHUNK secondi (elapsed finora: $ELAPSED / $TOTAL_SECONDS)"
            echo "=================================================================="

            LISTEN_SECONDS=$THIS_CHUNK python mls_sentiment_scanner.py

            if [ -n "$(git status --porcelain -- $OUTPUT_DIRS)" ]; then
              git add $OUTPUT_DIRS
              git commit -m "Sentiment Scanner: sessione $CHUNK_NUM (protezione dati intermedia)"
              git pull --rebase --autostash origin main
              git push
              echo "Commit sessione $CHUNK_NUM completato — dati al sicuro su GitHub"
            else
              echo "Nessuna modifica in questa sessione, niente da committare"
            fi

            ELAPSED=$(( ELAPSED + THIS_CHUNK ))
            CHUNK_NUM=$(( CHUNK_NUM + 1 ))
          done

          echo "Tutte le sessioni completate, ascolto totale: $ELAPSED secondi"
