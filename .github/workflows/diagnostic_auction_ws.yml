name: Sorare Auction WebSocket Diagnostic (one-off)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run auction websocket diagnostic
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          PYTHONUNBUFFERED: "1"
        run: python diagnostic_auction_ws.py
