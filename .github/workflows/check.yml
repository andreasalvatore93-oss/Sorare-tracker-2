name: Sorare Price Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      listen_seconds:
        description: "Secondi di ascolto (lascia vuoto per 180 = normale; usa 20-30 per test veloci)"
        required: false
        default: "180"

permissions:
  contents: write

concurrency:
  group: sorare-tracker
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run tracker
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
          LISTEN_SECONDS: ${{ github.event.inputs.listen_seconds || '180' }}
        run: python track.py

      - name: Save state
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add tracker.db
          git diff --cached --quiet || git commit -m "update tracker db"
          git push
