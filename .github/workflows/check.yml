name: Sorare Price Check
on:
  workflow_dispatch:
    inputs:
      listen_seconds:
        description: "Secondi di ascolto (lascia vuoto per 200 = normale; usa 20-30 per test veloci)"
        required: false
        default: "200"
permissions:
  contents: write
# FIX 16/07: cancel-in-progress era true -- se un'esecuzione ne cancellava un'altra a meta'
# strada, tutto lo stato locale non ancora salvato (compresa la nuova coda pending_recheck,
# vedi track.py) andava perso silenziosamente, senza nessuna possibilita' di recuperarlo in
# futuro. In coda (false) invece nessuna esecuzione viene mai interrotta a meta': si mette
# solo in attesa che la precedente finisca di salvare, un po' di ritardo ma zero perdita dati.
concurrency:
  group: sorare-tracker
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # FIX 16/07 (v2, caso righe "resuscitate" nella coda pending_recheck): senza "ref: main"
      # il checkout usa lo SHA di main congelato al momento in cui il trigger e' stato CREATO
      # (quando cron-job.org ha chiamato l'API), non quello di quando la run inizia DAVVERO a
      # eseguire -- e sappiamo che le run restano in coda anche minuti prima di partire (vedi
      # cancel-in-progress: false sopra). Una run rimasta in coda finiva quindi per lavorare su
      # un tracker.db vecchio, e quando pushava andava in conflitto con run nel frattempo gia'
      # concluse -- conflitto risolto piu' sotto con "-X ours", che teneva proprio la versione
      # vecchia scartando in silenzio il lavoro dell'altra run (caso Mika Godts/Matt Turner/
      # Warren Zaire-Emery/Joshua Kimmich/Maghnes Akliouche del 16/07, verificato nei log delle
      # run #218/#219). "ref: main" forza invece a risolvere il branch al momento vero del
      # checkout, sempre allo stato piu' fresco disponibile in quel momento.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      # FIX 17/07 (richiesta esplicita dell'utente, "non c'e' modo di avere i log senza Chrome"):
      # oltre a stampare su stdout (visibile solo nella UI di GitHub Actions, lenta/scomoda da
      # consultare), scriviamo lo stesso output anche su file, poi lo committiamo (vedi step
      # "Save state" sotto) -- dato che il repo e' gia' sincronizzato in locale via GitHub
      # Desktop, dopo un pull il log e' leggibile direttamente da file, senza copia-incolla ne'
      # browser.
      # FIX 17/07 (v2, richiesta esplicita dell'utente, "faccio girare i tracker per mezz'ora,
      # accumulo un po' di log e poi te li leggi tutti insieme quando pullo"): da sovrascritto
      # (ogni run cancellava il precedente) ad ACCODATO (tee -a), con un separatore "===== RUN
      # <timestamp> =====" tra un'esecuzione e la successiva, cosi' un pull dopo N run mostra
      # tutta la sequenza, non solo l'ultima. "set -o pipefail" garantisce che un errore di
      # track.py faccia comunque fallire lo step (senza, il codice di uscita di "tee"
      # mascererebbe quello di python).
      - name: Run tracker
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
          LISTEN_SECONDS: ${{ github.event.inputs.listen_seconds || '200' }}
        run: |
          set -o pipefail
          mkdir -p logs
          {
            echo ""
            echo "===== RUN $(date -u '+%Y-%m-%d %H:%M:%S UTC') ====="
            python track.py
          } 2>&1 | tee -a logs/track_last_run.log
          # Rete di sicurezza SOLO per non far crescere il file all'infinito se l'utente non
          # pulla mai (es. dimenticato per giorni): tiene le ultime 200 run INTERE (mai un run a
          # meta'), tagliando solo dal marcatore "===== RUN" -- ~16h+ di storia anche sul
          # tracker piu' verboso, ben oltre la mezz'ora tipica tra un pull e l'altro, quindi in
          # uso normale questo taglio non scatta mai.
          awk -v maxruns=200 '
            /^===== RUN / { runs++; starts[runs]=NR }
            { buf[NR]=$0; last=NR }
            END {
              from = (runs > maxruns) ? starts[runs-maxruns+1] : 1
              for (i=from; i<=last; i++) print buf[i]
            }
          ' logs/track_last_run.log > logs/track_last_run.log.tmp && mv logs/track_last_run.log.tmp logs/track_last_run.log
      # if: always() -- vogliamo il log salvato anche se track.py fallisce/va in timeout,
      # e' proprio in quei casi che serve di piu' per capire cosa e' successo.
      - name: Save state
        if: always()
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add tracker.db
          if [ -f logs/track_last_run.log ]; then
            git add logs/track_last_run.log
          fi
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git commit -m "update tracker db + log ultima esecuzione"
          attempt=0
          until git push; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 5 ]; then
              echo "Impossibile salvare dopo 5 tentativi, abbandono."
              exit 1
            fi
            echo "Push fallito (probabile esecuzione in parallelo), ritento tra qualche secondo... (tentativo $attempt)"
            sleep $((RANDOM % 8 + 3))
            git fetch origin main
            git merge --no-edit -X ours origin/main
          done
          echo "Salvato correttamente."
