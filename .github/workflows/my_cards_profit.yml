name: My Cards Profit Analyzer

on:
  workflow_dispatch:
    inputs:
      scan_count:
        description: "Quante carte nuove scannerizzare per run (default 10, ignora le già analizzate)"
        required: false
        default: "10"

permissions:
  contents: write

concurrency:
  group: my-cards-profit
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run my cards profit analyzer
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          # FIX 18/07: track.send_telegram_msg legge da TELEGRAM_TOKEN/TELEGRAM_CHAT_ID (i suoi
          # globali di modulo), non da BUNDLE_TELEGRAM_TOKEN/BUNDLE_TELEGRAM_CHAT_ID -- stesso
          # mapping gia' usato in manager_bundle_scan.yml, per finire nello stesso canale/bot.
          TELEGRAM_TOKEN: ${{ secrets.BUNDLE_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BUNDLE_TELEGRAM_CHAT_ID }}
          MY_CARDS_PROFIT_SCAN_COUNT: ${{ github.event.inputs.scan_count || '10' }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          mkdir -p logs
          {
            echo ""
            echo "===== RUN $(date -u '+%Y-%m-%d %H:%M:%S UTC') (scan_count=$MY_CARDS_PROFIT_SCAN_COUNT) ====="
            python my_cards_profit.py
          } 2>&1 | tee -a logs/my_cards_profit_last_run.log
          # Rete di sicurezza: mantieni le ultime 200 run intere
          awk -v maxruns=200 '
            /^===== RUN / { runs++; starts[runs]=NR }
            { buf[NR]=$0; last=NR }
            END {
              from = (runs > maxruns) ? starts[runs-maxruns+1] : 1
              for (i=from; i<=last; i++) print buf[i]
            }
          ' logs/my_cards_profit_last_run.log > logs/my_cards_profit_last_run.log.tmp && mv logs/my_cards_profit_last_run.log.tmp logs/my_cards_profit_last_run.log

      - name: Save log and state files
        if: always()
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -f logs/my_cards_profit_last_run.log ]; then
            git add logs/my_cards_profit_last_run.log
          fi
          # Salva i file di stato (carte analizzate e backlog)
          if [ -f .my_cards_profit_analyzed.txt ]; then
            git add .my_cards_profit_analyzed.txt
          fi
          if [ -f .my_cards_profit_backlog.txt ]; then
            git add .my_cards_profit_backlog.txt
          fi
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git commit -m "update my_cards_profit log and state"
          attempt=0
          until git push; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 5 ]; then
              echo "Impossibile salvare dopo 5 tentativi, abbandono."
              exit 1
            fi
            echo "Push fallito, ritento tra qualche secondo... (tentativo $attempt)"
            sleep $((RANDOM % 8 + 3))
            git fetch origin main
            git merge --no-edit -X ours origin/main
          done
          echo "Salvato correttamente."
