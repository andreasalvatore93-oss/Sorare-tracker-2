name: Sorare Auction Check

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sorare-auctions
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run auction checker
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          AUCTION_TELEGRAM_TOKEN: ${{ secrets.AUCTION_TELEGRAM_TOKEN }}
          AUCTION_TELEGRAM_CHAT_ID: ${{ secrets.AUCTION_TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: python auctions.py

      - name: Save state
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add auctions.db
          git diff --cached --quiet || git commit -m "update auctions db"
          git push
