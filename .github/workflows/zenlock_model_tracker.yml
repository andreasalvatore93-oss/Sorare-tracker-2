name: ZenLock Model Tracker
# Tracker LIVE separato dal tracker principale (check.yml) -- backlog #8/#11, richiesta esplicita
# dell'utente 17/07: stesse notifiche Telegram (stesso canale/secrets), ma girato con un proprio
# workflow dedicato apposta per non toccare/rallentare/rompere in nessun modo il tracker
# principale. Nessuna scrittura su tracker.db: questo tracker e' stateless, valuta ogni annuncio
# live contro le soglie del modello ZenLock (vedi zenlock_model_tracker.py) e basta.
# FIX 17/07 (v2, richiesta esplicita dell'utente, "sistemare il buco dei 40 secondi"): 200 ->
# 215. Il cron esterno (cron-job.org) rilancia ogni 4 minuti (240s), ma il WebSocket resta
# disconnesso tra la chiusura di un'esecuzione e la connessione della successiva (Sorare non fa
# replay degli eventi persi) -- osservato nei log reali un buco di ~40-43s (es. run chiuso alle
# 14:47:35, run successivo connesso alle 14:48:18). Alzare listen_seconds accorcia quel buco
# (il tempo "morto" resta comunque quello di avvio del runner GitHub Actions, non eliminabile
# da qui) senza rischiare sovrapposizioni pericolose.
# FIX 17/07 (v3, richiesta esplicita dell'utente): il cron esterno e' stato spostato da 4 a 5
# minuti (300s) per ridurre il carico cumulativo verso Sorare (meno 429, vedi fix cache/margine
# in auctions_ws_listener.py) -- ma senza alzare listen_seconds in proporzione il buco tra le
# esecuzioni si sarebbe allargato da ~40s a ~85-100s, e zenlock (a differenza delle aste) non ha
# una scansione di sicurezza di ripristino: un annuncio aperto e richiuso proprio in quel buco
# piu' largo sarebbe invisibile. 215 -> 250s riporta il buco a dimensioni simili a prima, con
# margine sotto sia il ciclo di 300s del cron sia il timeout-minutes:5 (300s) del job.
on:
  workflow_dispatch:
    inputs:
      listen_seconds:
        description: "Secondi di ascolto (lascia vuoto per 250 = normale; usa 20-30 per test veloci)"
        required: false
        default: "250"
      diagnostic_player_slug:
        description: "Lascia vuoto normalmente. Slug giocatore per dump grezzo COMPLETO (non filtrato) degli annunci live, per casi dubbi (annuncio noto mancante dai comparabili)"
        required: false
        default: ""
      diagnostic_sale_season_slug:
        description: "Lascia vuoto normalmente. Slug giocatore per verificare se tokenPrices.card accetta inSeasonEligible/sportSeason (indagine storico vendite per stagione)"
        required: false
        default: ""
# FIX 17/07 (richiesta esplicita dell'utente, "non c'e' modo di avere i log senza Chrome"):
# read -> write. Il tracker resta stateless per tracker.db (nessuna scrittura, vedi nota sopra),
# ma ora scrive e committa il log dell'ultima esecuzione (vedi step "Save log" in fondo), quindi
# serve il permesso di scrittura sul repo.
permissions:
  contents: write
concurrency:
  group: zenlock-model-tracker
  cancel-in-progress: false
jobs:
  zenlock_model_tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run ZenLock model tracker
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
          ZENLOCK_LISTEN_SECONDS: ${{ github.event.inputs.listen_seconds || '250' }}
          ZENLOCK_DIAGNOSTIC_PLAYER_SLUG: ${{ github.event.inputs.diagnostic_player_slug || '' }}
          ZENLOCK_DIAGNOSTIC_SALE_SEASON_SLUG: ${{ github.event.inputs.diagnostic_sale_season_slug || '' }}
        # FIX 17/07 (v2, richiesta esplicita dell'utente, stesso motivo gemello di check.yml):
        # sovrascritto -> ACCODATO (tee -a) con separatore per run, cosi' si puo' far girare il
        # tracker per una mezz'ora e pullare tutti i run accumulati insieme, non solo l'ultimo.
        run: |
          set -o pipefail
          mkdir -p logs
          {
            echo ""
            echo "===== RUN $(date -u '+%Y-%m-%d %H:%M:%S UTC') ====="
            python zenlock_model_tracker.py
          } 2>&1 | tee -a logs/zenlock_last_run.log
          # Rete di sicurezza SOLO per non far crescere il file all'infinito se l'utente non
          # pulla mai -- vedi commento gemello in check.yml.
          awk -v maxruns=200 '
            /^===== RUN / { runs++; starts[runs]=NR }
            { buf[NR]=$0; last=NR }
            END {
              from = (runs > maxruns) ? starts[runs-maxruns+1] : 1
              for (i=from; i<=last; i++) print buf[i]
            }
          ' logs/zenlock_last_run.log > logs/zenlock_last_run.log.tmp && mv logs/zenlock_last_run.log.tmp logs/zenlock_last_run.log

      # if: always() -- vogliamo il log salvato anche se lo script fallisce/va in timeout.
      - name: Save log
        if: always()
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -f logs/zenlock_last_run.log ]; then
            git add logs/zenlock_last_run.log
          fi
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git commit -m "update zenlock log (ultima esecuzione)"
          attempt=0
          until git push; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 5 ]; then
              echo "Impossibile salvare log dopo 5 tentativi, abbandono."
              exit 1
            fi
            echo "Push fallito (probabile esecuzione in parallelo), ritento tra qualche secondo... (tentativo $attempt)"
            sleep $((RANDOM % 8 + 3))
            git fetch origin main
            git merge --no-edit -X ours origin/main
          done
          echo "Salvato correttamente."
