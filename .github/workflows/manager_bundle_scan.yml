name: Manager Bundle Offer Scanner

on:
  workflow_dispatch:
    inputs:
      manager_slug_or_url:
        description: "Slug del manager (es. 'satonio') oppure URL del suo profilo. Lascia VUOTO solo se usi l'auto-discovery qui sotto."
        required: false
      auto_find_manager:
        description: "Scrivi 'si' per l'auto-discovery: ascolta il mercato e trova da solo un manager con almeno 10 carte in season in vendita (usato SOLO se il campo manager sopra e' vuoto). Default 'si' -- disabilita con 'no' se vuoi solo exit senza input."
        required: false
        default: "si"
      blacklist_managers:
        description: "Aggiungi manager alla blacklist temporanea per questa run (lista di slug separati da virgola, es. 'satonio, zenlock, clem777'). Persiste per sempre nel codice se aggiunto qui e non rimosso."
        required: false
        default: ""
      auto_find_listen_seconds:
        description: "Solo per auto-discovery: secondi di ascolto del mercato prima di scegliere il manager"
        required: false
        default: "60"
      bundle_offer_margin_fraction:
        description: "Margine di sconto sul totale minimo di mercato per l'offerta suggerita (es. 0.25 = 25%, provvisorio da tarare)"
        required: false
        default: "0.25"
      max_owned_card_pages:
        description: "Tetto di sicurezza: numero massimo di pagine di carte possedute da scansionare"
        required: false
        default: "20"
      max_players_to_check:
        description: "Tetto di sicurezza: numero massimo di giocatori diversi da controllare sul mercato"
        required: false
        default: "300"
      bundle_block_size:
        description: "Numero di carte per blocco (limite Sorare per offerta cumulativa: max 10)"
        required: false
        default: "10"

permissions:
  contents: write

# Workflow manuale, uno-shot (nessun ascolto, nessuna cadenza cron esterna) -- a differenza dei
# tre tracker esistenti, gira finche' non termina l'analisi e basta. Concurrency comunque in
# coda (non cancel-in-progress) per lo stesso motivo degli altri workflow: se lanci due analisi
# quasi in contemporanea, la seconda aspetta che la prima finisca di salvare il log invece di
# rischiare un conflitto push.
concurrency:
  group: manager-bundle-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # Stesso pattern di log-su-file-accodato gia' usato dai tre tracker esistenti (leggibile
      # dopo un pull, senza Chrome ne' copia-incolla).
      - name: Run manager bundle scan
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          # FIX 18/07 (richiesta esplicita dell'utente, "creato chat bot dedicato per le notifiche
          # telegram dello scanner"): non piu' un riuso temporaneo del canale aste -- bot Telegram
          # dedicato a questo scanner. Servono 2 NUOVI secret su GitHub (Settings > Secrets and
          # variables > Actions > New repository secret), che l'utente deve aggiungere lui stesso
          # (mai gestiti da qui): BUNDLE_TELEGRAM_TOKEN = il token del bot da BotFather,
          # BUNDLE_TELEGRAM_CHAT_ID = 409250306 (il chat.id/from.id nella risposta getUpdates
          # incollata dall'utente -- NON l'update_id, quello e' solo un numero di sequenza interno
          # di Telegram, mai un chat id).
          TELEGRAM_TOKEN: ${{ secrets.BUNDLE_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BUNDLE_TELEGRAM_CHAT_ID }}
          MANAGER_SLUG_OR_URL: ${{ github.event.inputs.manager_slug_or_url }}
          AUTO_FIND_MANAGER: ${{ github.event.inputs.auto_find_manager || 'si' }}
          AUTO_FIND_LISTEN_SECONDS: ${{ github.event.inputs.auto_find_listen_seconds || '60' }}
          BLACKLIST_MANAGERS: ${{ github.event.inputs.blacklist_managers }}
          BUNDLE_OFFER_MARGIN_FRACTION: ${{ github.event.inputs.bundle_offer_margin_fraction || '0.25' }}
          MAX_OWNED_CARD_PAGES: ${{ github.event.inputs.max_owned_card_pages || '20' }}
          MAX_PLAYERS_TO_CHECK: ${{ github.event.inputs.max_players_to_check || '300' }}
          BUNDLE_BLOCK_SIZE: ${{ github.event.inputs.bundle_block_size || '10' }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          mkdir -p logs
          {
            echo ""
            echo "===== RUN $(date -u '+%Y-%m-%d %H:%M:%S UTC') ====="
            python manager_bundle_scan.py
          } 2>&1 | tee -a logs/manager_bundle_scan_last_run.log
          # Rete di sicurezza SOLO per non far crescere il file all'infinito -- stesso pattern
          # gemello degli altri tre workflow, tiene le ultime 200 run intere.
          awk -v maxruns=200 '
            /^===== RUN / { runs++; starts[runs]=NR }
            { buf[NR]=$0; last=NR }
            END {
              from = (runs > maxruns) ? starts[runs-maxruns+1] : 1
              for (i=from; i<=last; i++) print buf[i]
            }
          ' logs/manager_bundle_scan_last_run.log > logs/manager_bundle_scan_last_run.log.tmp && mv logs/manager_bundle_scan_last_run.log.tmp logs/manager_bundle_scan_last_run.log

      # Nessun database da salvare qui (a differenza degli altri tre workflow): questo strumento
      # non ha stato persistente tra un'esecuzione e l'altra, ogni run e' autonomo. Salviamo solo
      # il log.
      - name: Save log
        if: always()
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -f logs/manager_bundle_scan_last_run.log ]; then
            git add logs/manager_bundle_scan_last_run.log
          fi
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git commit -m "update manager bundle scan log"
          attempt=0
          until git push; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 5 ]; then
              echo "Impossibile salvare dopo 5 tentativi, abbandono."
              exit 1
            fi
            echo "Push fallito (probabile esecuzione in parallelo), ritento tra qualche secondo... (tentativo $attempt)"
            sleep $((RANDOM % 8 + 3))
            git fetch origin main
            git merge --no-edit -X ours origin/main
          done
          echo "Salvato correttamente."
