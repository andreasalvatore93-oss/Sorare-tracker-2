name: Snipe Pattern Analysis - Satonio
on:
  workflow_dispatch:
    inputs:
      user_slug:
        description: "Manager Sorare da analizzare (slug)"
        required: false
        default: "satonio"
      window_days:
        description: "Quanti giorni indietro analizzare (satonio ha un turnover molto piu' alto di zenlock, parti basso)"
        required: false
        default: "3"
      max_pages:
        description: "Quante pagine scansionare (di carte in modalita' trades/margin_model+searchCards, o di transazioni in modalita' trades -- satonio ha volumi molto piu' alti di zenlock)"
        required: false
        default: "50"
      report_mode:
        description: "trades (acquisti+vendite complete) o margin_model (solo snipe puri, con sconto% vs mercato e bucket in_season/classic)"
        required: false
        default: "trades"
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run snipe pattern analysis (satonio)
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          PYTHONUNBUFFERED: "1"
          SNIPE_USER_SLUG: ${{ github.event.inputs.user_slug || 'satonio' }}
          SNIPE_WINDOW_DAYS: ${{ github.event.inputs.window_days || '3' }}
          SNIPE_MAX_PAGES: ${{ github.event.inputs.max_pages || '50' }}
          SNIPE_REPORT_MODE: ${{ github.event.inputs.report_mode || 'trades' }}
        run: python snipe_pattern_analysis.py
