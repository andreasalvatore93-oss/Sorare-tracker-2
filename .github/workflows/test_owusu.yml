name: Test Owusu Prediction (prototipo)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: test-owusu-prediction
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests curl_cffi

      - name: Run Owusu prediction prototype
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          PYTHONUNBUFFERED: "1"
        run: python test_owusu.py

      - name: Commit output e cache
        if: always()
        run: |
          git config user.name "test-owusu-bot"
          git config user.email "test-owusu-bot@users.noreply.github.com"
          git add test_owusu/
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git commit -m "Test Owusu: nuova predizione"
          attempt=0
          until git push; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 5 ]; then
              echo "Impossibile salvare dopo 5 tentativi, abbandono."
              exit 1
            fi
            echo "Push fallito, ritento tra qualche secondo... (tentativo $attempt)"
            sleep $((RANDOM % 8 + 3))
            git fetch origin main
            git merge --no-edit -X ours origin/main
          done
          echo "Salvato correttamente."
