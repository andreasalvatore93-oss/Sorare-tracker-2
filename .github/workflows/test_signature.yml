name: Test Firma Starkware (isolato, NESSUN acquisto reale)
on:
  workflow_dispatch:
    inputs:
      test_fingerprint:
        description: "Fingerprint da una prenotazione gia' fatta (vedi log, es. caso Sergey Pinyaev)"
        required: true
      test_currency:
        description: "Campo 'currency' dal log (es. EUR)"
        required: true
      test_amount:
        description: "Campo 'amount' dal log (es. 1049)"
        required: true
      test_mangopay_wallet_id:
        description: "Campo 'mangopayWalletId' dal log"
        required: true
      test_nonce:
        description: "Campo 'nonce' dal log (es. 9961)"
        required: true
      test_operation_hash:
        description: "Campo 'operationHash' dal log"
        required: true
permissions:
  contents: read
jobs:
  test-signature:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install sorare-sign dependencies
        run: |
          cd sorare-sign
          npm install
      - run: pip install requests
      - name: Test firma (isolato, nessun acquisto)
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          SORARE_WALLET_PASSWORD: ${{ secrets.SORARE_WALLET_PASSWORD }}
          TEST_FINGERPRINT: ${{ github.event.inputs.test_fingerprint }}
          TEST_CURRENCY: ${{ github.event.inputs.test_currency }}
          TEST_AMOUNT: ${{ github.event.inputs.test_amount }}
          TEST_MANGOPAY_WALLET_ID: ${{ github.event.inputs.test_mangopay_wallet_id }}
          TEST_NONCE: ${{ github.event.inputs.test_nonce }}
          TEST_OPERATION_HASH: ${{ github.event.inputs.test_operation_hash }}
        run: python test_signature_isolated.py
