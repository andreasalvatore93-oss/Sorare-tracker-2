name: Run Sorare Sniper Test

on:
  schedule:
    - cron: '*/15 * * * *' # Gira automaticamente ogni 15 minuti
  workflow_dispatch: # Abilita il pulsante manuale nel pannello Actions

jobs:
  run-sniper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Cache Database
      uses: actions/cache@v3
      with:
        path: sniper.db
        key: sniper-db-${{ github.run_id }}
        restore-keys: |
          sniper-db-

    - name: Execute Sniper Script
      env:
        SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
        SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python sniper.py
