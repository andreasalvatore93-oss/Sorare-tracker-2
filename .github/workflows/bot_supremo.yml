name: Bot Supremo Sorare (AutoBuy + MakeOffer fusi)
on:
  workflow_dispatch:
    inputs:
      min_price_eur:
        description: "Prezzo minimo carta da valutare (EUR)"
        required: false
        default: "1"
      max_price_eur:
        description: "Prezzo massimo carta da valutare (EUR)"
        required: false
        default: "30"
      makeoffer_margin_percent:
        description: "Margine MINIMO per il ramo MakeOffer (offerta scontata), in % (es. 10 = 10%)"
        required: false
        default: "17"
      makeoffer_max_margin_percent:
        description: "Margine MASSIMO per il ramo MakeOffer -- oltre questa soglia interviene AutoBuy"
        required: false
        default: "27"
      offer_discount_percent:
        description: "Sconto ULTERIORE sul minimo per calcolare il prezzo dell'offerta MakeOffer, in %"
        required: false
        default: "20"
      autobuy_margin_percent:
        description: "Margine MINIMO per il ramo AutoBuy (accetta offerta esistente), in % -- deve essere >= makeoffer_max_margin_percent"
        required: false
        default: "28"
      listen_seconds:
        description: "Secondi di ascolto massimi, max 18000 (5h)"
        required: false
        default: "18000"
      commit_interval_seconds:
        description: "Ogni quanti secondi il bot fa commit+push della lista nera DURANTE la run (protezione da interruzioni) -- default 300 = 5 minuti"
        required: false
        default: "300"
      liquidity_diagnostic:
        description: "'si' = log dettagliato diagnostico sul conteggio transazioni (nodi ricevuti, scarti per tipo/data/stagione) per capire falsi 'mercato sottile'. 'no' = normale."
        required: false
        default: "no"
      target_matches:
        description: "Quanti casi totali (AutoBuy + MakeOffer) notificare prima di fermarsi (1-20)"
        required: false
        default: "3"
      autobuy_diagnostic:
        description: "Log extra sul confronto in_season/classic per lega, di default spento"
        required: false
        default: "no"
      blacklisted_player_slugs:
        description: "Slug giocatori da aggiungere PERMANENTEMENTE alla blacklist unita (separati da virgola)"
        required: false
        default: ""
      check_classic:
        description: "Controlla anche gli annunci CLASSIC (tutti i campionati) -- vale per ENTRAMBI i rami, AutoBuy e MakeOffer, un solo interruttore condiviso"
        required: false
        default: "si"
      min_recent_transactions:
        description: "Transazioni minime (7gg) per non scartare il caso -- protezione mercato sottile"
        required: false
        default: "4"
      min_transactions_30d:
        description: "Transazioni minime (30gg) -- secondo layer di protezione liquidita' (il server mostra al massimo 5 transazioni totali per giocatore; questa soglia non puo' essere piu' bassa di min_recent_transactions, la finestra 30gg include sempre quella 7gg)"
        required: false
        default: "4"
      blacklisted_manager_slugs:
        description: "Slug MANAGER da aggiungere PERMANENTEMENTE alla blacklist unita (separati da virgola)"
        required: false
        default: ""
      blacklisted_league_slugs:
        description: "Slug CAMPIONATI da aggiungere alla blacklist unita (separati da virgola, es. premiership-gb-sct) -- carte di questi campionati vengono ignorate completamente, default 15gg rinnovabile"
        required: false
        default: ""
      league_blacklist_verbose_log:
        description: "'si' = log dettagliato per OGNI carta scartata per campionato blacklistato (utile per il primo test). 'no' = filtro silenzioso."
        required: false
        default: "no"
      autobuy_live_mode:
        description: "'si' = ACQUISTO REALE AUTOMATICO (ramo AutoBuy). 'no' = solo diagnostica."
        required: false
        default: "si"
      makeoffer_live_mode:
        description: "'si' = OFFERTE REALI AUTOMATICHE (ramo MakeOffer). 'no' = solo diagnostica."
        required: false
        default: "si"
      offer_duration_days:
        description: "Durata dell'offerta MakeOffer in giorni interi, 1-7"
        required: false
        default: "1"
      max_pending_offers:
        description: "Tetto massimo di offerte MakeOffer pendenti create in questa esecuzione"
        required: false
        default: "20"
      diagnostic_player_slug:
        description: "TEST ISOLATO: se valorizzato, il bot verifica SOLO il conteggio transazioni di questo slug (log diagnostico completo) e termina in pochi secondi -- ignora mercato/listener/blacklist. Lasciare vuoto per il funzionamento normale del bot."
        required: false
        default: "paxten-aaronson"
permissions:
  contents: write
concurrency:
  group: sorare-bot-supremo
  cancel-in-progress: false
jobs:
  bot-supremo:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install sorare-sign dependencies
        run: |
          cd sorare-sign
          npm install
      - run: pip install requests websocket-client curl_cffi playwright
      - run: playwright install --with-deps chromium
      - name: Run Bot Supremo
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          SORARE_VERSION: ${{ secrets.SORARE_VERSION }}
          SORARE_BUILD: ${{ secrets.SORARE_BUILD }}
          SORARE_DEVICE_FINGERPRINT: ${{ secrets.SORARE_DEVICE_FINGERPRINT }}
          SORARE_WALLET_PASSWORD: ${{ secrets.SORARE_WALLET_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
          AUTOBUY_MIN_PRICE_EUR: ${{ github.event.inputs.min_price_eur || '1' }}
          AUTOBUY_MAX_PRICE_EUR: ${{ github.event.inputs.max_price_eur || '30' }}
          MAKEOFFER_MARGIN_PERCENT_INPUT: ${{ github.event.inputs.makeoffer_margin_percent || '17' }}
          MAKEOFFER_MAX_MARGIN_PERCENT_INPUT: ${{ github.event.inputs.makeoffer_max_margin_percent || '27' }}
          AUTOBUY_MARGIN_PERCENT_INPUT: ${{ github.event.inputs.autobuy_margin_percent || '28' }}
          LISTEN_SECONDS: ${{ github.event.inputs.listen_seconds || '18000' }}
          COMMIT_INTERVAL_SECONDS: ${{ github.event.inputs.commit_interval_seconds || '300' }}
          LIQUIDITY_DIAGNOSTIC: ${{ github.event.inputs.liquidity_diagnostic || 'no' }}
          AUTOBUY_TARGET_MATCHES: ${{ github.event.inputs.target_matches || '3' }}
          AUTOBUY_DIAGNOSTIC: ${{ github.event.inputs.autobuy_diagnostic || 'no' }}
          BLACKLISTED_PLAYER_SLUGS: ${{ github.event.inputs.blacklisted_player_slugs || '' }}
          CHECK_CLASSIC: ${{ github.event.inputs.check_classic || 'si' }}
          MIN_RECENT_TRANSACTIONS: ${{ github.event.inputs.min_recent_transactions || '4' }}
          MIN_TRANSACTIONS_30D: ${{ github.event.inputs.min_transactions_30d || '4' }}
          BLACKLISTED_MANAGER_SLUGS: ${{ github.event.inputs.blacklisted_manager_slugs || '' }}
          BLACKLISTED_LEAGUE_SLUGS: ${{ github.event.inputs.blacklisted_league_slugs || '' }}
          LEAGUE_BLACKLIST_VERBOSE_LOG: ${{ github.event.inputs.league_blacklist_verbose_log || 'no' }}
          AUTOBUY_LIVE_MODE: ${{ github.event.inputs.autobuy_live_mode || 'si' }}
          MAKEOFFER_LIVE_MODE: ${{ github.event.inputs.makeoffer_live_mode || 'si' }}
          OFFER_DISCOUNT_PERCENT_INPUT: ${{ github.event.inputs.offer_discount_percent || '20' }}
          OFFER_DURATION_DAYS: ${{ github.event.inputs.offer_duration_days || '1' }}
          MAX_PENDING_OFFERS: ${{ github.event.inputs.max_pending_offers || '20' }}
          DIAGNOSTIC_PLAYER_SLUG: ${{ github.event.inputs.diagnostic_player_slug || '' }}
        run: |
          set -o pipefail
          export MAKEOFFER_MARGIN_FRACTION=$(awk -v p="$MAKEOFFER_MARGIN_PERCENT_INPUT" 'BEGIN { printf "%.4f", p / 100 }')
          export MAKEOFFER_MAX_MARGIN_FRACTION=$(awk -v p="$MAKEOFFER_MAX_MARGIN_PERCENT_INPUT" 'BEGIN { printf "%.4f", p / 100 }')
          export AUTOBUY_MARGIN_FRACTION=$(awk -v p="$AUTOBUY_MARGIN_PERCENT_INPUT" 'BEGIN { printf "%.4f", p / 100 }')
          export OFFER_DISCOUNT_FRACTION=$(awk -v p="$OFFER_DISCOUNT_PERCENT_INPUT" 'BEGIN { printf "%.4f", p / 100 }')
          python bot_supremo.py
      - name: Commit lista nera unica (manager, giocatori, thin market, cooldown acquisti)
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- sorare_lista_nera.txt)" ]; then
            echo "Nessuna modifica alla lista nera, niente da committare."
          else
            git config user.name "bot-supremo"
            git config user.email "bot-supremo@users.noreply.github.com"
            git add sorare_lista_nera.txt
            git commit -m "Bot Supremo: aggiorna lista nera unica"
            git pull --rebase --autostash origin main
            git push
          fi
