name: Auction WebSocket Listener

on:
  workflow_dispatch:
    inputs:
      listen_seconds:
        description: "Secondi di ascolto (deve stare sotto l'intervallo del cron)"
        required: false
        default: "160"
      diagnostic_end_date_sort:
        description: "Lascia vuoto normalmente. Valorizza (es. 'si') per far scattare il diagnostico su come ordinare le aste per data di scadenza"
        required: false
        default: ""
      diagnostic_pagination:
        description: "Lascia vuoto normalmente. Valorizza (es. 'si') per far scattare il diagnostico su paginazione a cursore (before) su liveAuctions"
        required: false
        default: ""
      ending_soon_enabled:
        description: "Lascia vuoto normalmente (OFF). Valorizza (es. 'si') per abilitare in questo run la scansione 'ending soon' (aste ferme vicine alla scadenza)"
        required: false
        default: ""
      ending_soon_max_pages:
        description: "Numero massimo di pagine da 50 aste da scansionare per 'ending soon'"
        required: false
        default: "10"
      ending_soon_window_hours:
        description: "Finestra in ore entro cui un'asta e' considerata 'in scadenza' per la scansione ending-soon"
        required: false
        default: "6"

permissions:
  contents: write

# FIX 16/07: la scansione di sicurezza aggiunta oggi ha allungato ogni esecuzione da
# ~110-120s a ~200s. Con un cron esterno (cron-job.org) che rilancia ogni 4 minuti c'e'
# margine sulla carta, ma l'avvio della macchina GitHub Actions (checkout, setup python,
# pip install) non e' incluso in quel conteggio -- caso reale: due esecuzioni si sono
# accavallate, il push della prima e' andato in conflitto e la riga "notificata" e' andata
# persa localmente (il messaggio Telegram pero' era gia' partito, non annullabile) ->
# stessa asta notificata due volte. concurrency in coda (non cancel-in-progress) garantisce
# che GitHub non faccia MAI partire una nuova esecuzione finche' la precedente non ha
# finito di salvare, a prescindere dai tempi del cron.
# FIX 17/07 (richiesta esplicita dell'utente): cron esterno spostato da 4 a 5 minuti (300s,
# stesso motivo del fix gemello su zenlock_model_tracker.yml -- ridurre il carico cumulativo
# verso Sorare). 110 -> 160s per mantenere proporzionalmente stretto il buco WS tra
# un'esecuzione e la successiva col nuovo ciclo piu' lungo. La scansione di sicurezza copre
# comunque gran parte del rischio residuo (ripesca le 50 aste live piu' recenti a ogni avvio),
# quindi qui il margine e' meno critico che su zenlock (che non ha un equivalente).
concurrency:
  group: auctions-ws-listener
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # FIX 16/07 (stesso bug trovato in check.yml): senza "ref: main" il checkout puo'
      # prendere un riferimento diverso/stantio da quello che cron-job.org passa nella
      # chiamata API a workflow_dispatch (che richiede un "ref" nel body della richiesta) --
      # forzando esplicitamente main siamo sicuri di lavorare sempre sull'ultima versione
      # del codice e del database, indipendentemente da cosa passa il chiamante esterno.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # FIX 17/07 (richiesta esplicita dell'utente, "non c'e' modo di avere i log senza Chrome"):
      # stesso pattern gemello di check.yml -- log anche su file, poi committato (vedi step
      # "Save state" sotto), cosi' dopo un pull in GitHub Desktop e' leggibile in locale senza
      # copia-incolla ne' Chrome.
      # FIX 17/07 (v2, richiesta esplicita dell'utente, stesso motivo gemello di check.yml):
      # sovrascritto -> ACCODATO (tee -a) con separatore per run, cosi' si puo' far girare il
      # tracker per una mezz'ora e pullare tutti i run accumulati insieme, non solo l'ultimo.
      - name: Run auction websocket listener
        env:
          SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
          SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
          AUCTION_TELEGRAM_TOKEN: ${{ secrets.AUCTION_TELEGRAM_TOKEN }}
          AUCTION_TELEGRAM_CHAT_ID: ${{ secrets.AUCTION_TELEGRAM_CHAT_ID }}
          AUCTION_LISTEN_SECONDS: ${{ github.event.inputs.listen_seconds || '160' }}
          AUCTION_DIAGNOSTIC_END_DATE_SORT: ${{ github.event.inputs.diagnostic_end_date_sort || '' }}
          AUCTION_DIAGNOSTIC_PAGINATION: ${{ github.event.inputs.diagnostic_pagination || '' }}
          AUCTION_ENDING_SOON_ENABLED: ${{ github.event.inputs.ending_soon_enabled || '' }}
          AUCTION_ENDING_SOON_MAX_PAGES: ${{ github.event.inputs.ending_soon_max_pages || '10' }}
          AUCTION_ENDING_SOON_WINDOW_HOURS: ${{ github.event.inputs.ending_soon_window_hours || '6' }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          mkdir -p logs
          {
            echo ""
            echo "===== RUN $(date -u '+%Y-%m-%d %H:%M:%S UTC') ====="
            python auctions_ws_listener.py
          } 2>&1 | tee -a logs/auctions_last_run.log
          # Rete di sicurezza SOLO per non far crescere il file all'infinito se l'utente non
          # pulla mai -- vedi commento gemello in check.yml.
          awk -v maxruns=200 '
            /^===== RUN / { runs++; starts[runs]=NR }
            { buf[NR]=$0; last=NR }
            END {
              from = (runs > maxruns) ? starts[runs-maxruns+1] : 1
              for (i=from; i<=last; i++) print buf[i]
            }
          ' logs/auctions_last_run.log > logs/auctions_last_run.log.tmp && mv logs/auctions_last_run.log.tmp logs/auctions_last_run.log

      - name: Save state
        if: always()
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add auctions.db
          if [ -f logs/auctions_last_run.log ]; then
            git add logs/auctions_last_run.log
          fi
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
            exit 0
          fi
          git commit -m "update auctions db + log (ws listener)"
          attempt=0
          until git push; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 5 ]; then
              echo "Impossibile salvare dopo 5 tentativi, abbandono."
              exit 1
            fi
            echo "Push fallito (probabile esecuzione in parallelo), ritento tra qualche secondo... (tentativo $attempt)"
            sleep $((RANDOM % 8 + 3))
            git fetch origin main
            git merge --no-edit -X ours origin/main
          done
          echo "Salvato correttamente."
