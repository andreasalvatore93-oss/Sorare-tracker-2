name: Sorare Price Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      SORARE_COOKIE: ${{ secrets.SORARE_COOKIE }}
      SORARE_CSRF: ${{ secrets.SORARE_CSRF }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Sync Registry
        run: python sync_registry.py

      - name: Run tracker
        run: python track.py

      - name: Save state
        run: |
          git config user.name "sorare-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json players_registry.json
          git diff --cached --quiet || git commit -m "Auto-update state and registry"
          git push
"Set execution to 5 mins"
